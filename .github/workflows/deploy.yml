name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          target: ${{ secrets.VPS_APP_DIR || '/home/developer/henwasteoil-fe' }}
          source: >-
            .dockerignore,
            Dockerfile,
            docker-compose.yml,
            eslint.config.js,
            index.html,
            package-lock.json,
            package.json,
            public,
            src,
            vite.config.js

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR || '/home/developer/henwasteoil-fe' }}"
            SUDO_PASSWORD="${{ secrets.VPS_SUDO_PASSWORD }}"

            sudo_cmd() {
              if [ -n "$SUDO_PASSWORD" ]; then
                printf '%s\n' "$SUDO_PASSWORD" | sudo -S "$@"
              else
                sudo -n "$@"
              fi
            }

            docker_cmd() {
              if docker info >/dev/null 2>&1; then
                docker "$@"
              else
                sudo_cmd docker "$@"
              fi
            }

            cd "$APP_DIR"

            docker_cmd compose up -d --build
            docker_cmd image prune -f
